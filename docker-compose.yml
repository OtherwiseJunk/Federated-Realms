services:
  pds:
    image: ghcr.io/bluesky-social/pds:latest
    ports:
      - "${PDS_PORT:-2583}:3000"
    volumes:
      - pds-data:/pds
    environment:
      - PDS_HOSTNAME=${PDS_HOSTNAME:-localhost}
      - PDS_DATA_DIRECTORY=/pds
      - PDS_BLOBSTORE_DISK_LOCATION=/pds/blocks
      - PDS_JWT_SECRET=${PDS_JWT_SECRET:?PDS_JWT_SECRET is required}
      - PDS_ADMIN_PASSWORD=${PDS_ADMIN_PASSWORD:?PDS_ADMIN_PASSWORD is required}
      - PDS_PLC_ROTATION_KEY_K256_PRIVATE_KEY_HEX=${PDS_ROTATION_KEY:-}
      - PDS_DID_PLC_URL=${PDS_PLC_URL:-https://plc.directory}
      # Invite requirement is the bot gate for raw createAccount XRPC.
      # Only set false after the nginx createAccount rule + hCaptcha are live
      # (see rollout ratchet in GH issue #20).
      - PDS_INVITE_REQUIRED=${PDS_INVITE_REQUIRED:-true}
      - PDS_HCAPTCHA_SITE_KEY=${PDS_HCAPTCHA_SITE_KEY:-}
      - PDS_HCAPTCHA_SECRET_KEY=${PDS_HCAPTCHA_SECRET_KEY:-}
      - PDS_HCAPTCHA_TOKEN_SALT=${PDS_HCAPTCHA_TOKEN_SALT:-}
      - PDS_DEV_MODE=${PDS_DEV_MODE:-false}
      # AppView wiring — without these the PDS refuses all app.bsky.* routes
      # ("No service configured"), which breaks bsky.app login for accounts
      # homed here. Matches the official PDS distribution defaults.
      - PDS_BSKY_APP_VIEW_URL=${PDS_BSKY_APP_VIEW_URL:-https://api.bsky.app}
      - PDS_BSKY_APP_VIEW_DID=${PDS_BSKY_APP_VIEW_DID:-did:web:api.bsky.app}
      - PDS_REPORT_SERVICE_URL=${PDS_REPORT_SERVICE_URL:-https://mod.bsky.app}
      - PDS_REPORT_SERVICE_DID=${PDS_REPORT_SERVICE_DID:-did:plc:ar7c4by46qjdydhdevvrndac}
      - PDS_CRAWLERS=${PDS_CRAWLERS:-https://bsky.network}
      - PDS_EMAIL_SMTP_URL=${PDS_EMAIL_SMTP_URL:-smtp://fake:25}
      - PDS_EMAIL_FROM_ADDRESS=${PDS_EMAIL_FROM_ADDRESS:-noreply@${PDS_HOSTNAME:-localhost}}
      - LOG_ENABLED=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/xrpc/_health"]
      interval: 15s
      timeout: 5s
      start_period: 10s

  realms-server:
    build: .
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    depends_on:
      pds:
        condition: service_healthy
    environment:
      # Server basics
      - PORT=${PORT:-3000}
      - HOST=0.0.0.0
      - SERVER_NAME=${SERVER_NAME:-Federated Realms}
      - SERVER_DESCRIPTION=${SERVER_DESCRIPTION:-A mysterious dungeon awaits...}
      - DEFAULT_SPAWN=${DEFAULT_SPAWN:-starter-town:town-square}
      - DEV_MODE=${DEV_MODE:-false}
      # AT Proto / PDS
      - PDS_URL=http://pds:3000
      - PDS_HOSTNAME=${PDS_HOSTNAME:-localhost}
      - SERVER_DID=${SERVER_DID:-}
      - SERVER_HANDLE=${SERVER_HANDLE:-federated-realms.test}
      - SERVER_PASSWORD=${SERVER_PASSWORD:-}
      - PDS_PUBLIC_URL=${PDS_PUBLIC_URL:-}
      - DATA_DIR=/data
      # OAuth
      - PUBLIC_URL=${PUBLIC_URL:-http://localhost:${PORT:-3000}}
      # Federation
      - TRUST_POLICY=${TRUST_POLICY:-trust-listed}
      - TRUSTED_SERVERS=${TRUSTED_SERVERS:-}
      - MAX_ACCEPTED_LEVEL=${MAX_ACCEPTED_LEVEL:-50}
      # Bluesky bridge (optional)
      - BSKY_ENABLED=${BSKY_ENABLED:-false}
      - BSKY_IDENTIFIER=${BSKY_IDENTIFIER:-}
      - BSKY_PASSWORD=${BSKY_PASSWORD:-}
      - BSKY_SERVICE=${BSKY_SERVICE:-https://bsky.social}
      - BSKY_POST_TYPES=${BSKY_POST_TYPES:-chat,shout,event}
      - BSKY_PLAYER_CROSSPOST=${BSKY_PLAYER_CROSSPOST:-true}
      - BSKY_THREAD_REFRESH=${BSKY_THREAD_REFRESH:-60}
      - BSKY_THROTTLE_MS=${BSKY_THROTTLE_MS:-2000}
    volumes:
      - realms-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:' + (process.env.PORT || 3000) + '/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      start_period: 10s

  realms-web:
    build:
      context: .
      dockerfile: apps/web-client/Dockerfile
    ports:
      - "${WEB_PORT:-8080}:8080"
    depends_on:
      realms-server:
        condition: service_healthy
    environment:
      - PORT=8080
      - API_URL=http://realms-server:${PORT:-3000}
    restart: unless-stopped

volumes:
  pds-data:
  realms-data:
